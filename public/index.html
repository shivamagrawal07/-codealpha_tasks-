<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe - Social Media</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="auth-section" class="glass-panel">
    <h1>Welcome to Vibe</h1>
    <div class="tabs">
      <button id="tab-login" class="active">Login</button>
      <button id="tab-register">Register</button>
    </div>
    <form id="auth-form">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="auth-submit">Login</button>
    </form>
    <p id="auth-error" class="error-msg"></p>
  </div>

  <div id="main-app" class="hidden">
    <nav class="glass-nav">
      <h2>Vibe</h2>
      <div class="nav-links">
        <a href="index.html" class="active">Feed</a>
        <a href="#" id="nav-profile">Profile</a>
        <button id="logout-btn">Logout</button>
      </div>
    </nav>
    <main>
      <section class="create-post glass-panel">
        <textarea id="post-content" placeholder="What's on your mind?"></textarea>
        <button id="create-post-btn">Post</button>
      </section>
      <section id="feed">
        <!-- Posts will be injected here -->
      </section>
    </main>
  </div>
  
  <script src="js/app.js"></script>
</body>
</html>
